<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopSphere Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
scroll-behavior:smooth;
}

body{
background:#f4f4f4;
color:#333;
}

.dark{
background:#111827;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:#111827;
color:white;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav input{
padding:10px;
width:250px;
border:none;
border-radius:20px;
}

.hero{
height:70vh;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1200');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:50px;
}

.hero button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#2563eb;
color:white;
cursor:pointer;
}

.section{
padding:50px 5%;
}

.filters{
text-align:center;
margin-bottom:20px;
}

.filters button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:20px;
cursor:pointer;
background:#2563eb;
color:white;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:15px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
font-size:20px;
margin:10px 0;
}

.btn{
padding:10px 15px;
border:none;
border-radius:20px;
cursor:pointer;
margin:5px;
}

.cartbtn{
background:#2563eb;
color:white;
}

.wishbtn{
background:#ff4081;
color:white;
}

.checkout{
background:white;
padding:30px;
border-radius:15px;
max-width:500px;
margin:auto;
}

.checkout input{
width:100%;
padding:12px;
margin:10px 0;
}

.review{
background:white;
padding:20px;
border-radius:10px;
margin:10px 0;
}

.contact input,
.contact textarea{
width:100%;
padding:12px;
margin:10px 0;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:20px;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:white;
padding:12px 20px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<nav>
<div class="logo">🛍 ShopSphere</div>

<input type="text" id="search" placeholder="Search Products">

<div>
❤️ <span id="wishCount">0</span>
|
🛒 <span id="cartCount">0</span>

<button onclick="toggleDark()" class="btn">
🌙
</button>
</div>
</nav>

<section class="hero">
<div>
<h1>Future Shopping Experience</h1>
<p>Discover Amazing Products</p>
<button onclick="document.getElementById('shop').scrollIntoView()">
Shop Now
</button>
</div>
</section>

<section class="section" id="shop">

<h2 style="text-align:center;margin-bottom:20px;">
Featured Products
</h2>

<div class="filters">
<button onclick="filterProducts('All')">All</button>
<button onclick="filterProducts('Tech')">Tech</button>
<button onclick="filterProducts('Fashion')">Fashion</button>
</div>

<div class="products" id="productContainer"></div>

</section>

<section class="section">
<h2 style="text-align:center;">Checkout</h2>

<div class="checkout">
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="text" placeholder="Address">
<button class="btn cartbtn" onclick="showToast('Order Placed Successfully!')">
Place Order
</button>
</div>
</section>

<section class="section">
<h2 style="text-align:center;">Customer Reviews</h2>

<div class="review">
⭐⭐⭐⭐⭐ Amazing website design!
</div>

<div class="review">
⭐⭐⭐⭐ Great shopping experience.
</div>

<div class="review">
⭐⭐⭐⭐⭐ Fast and modern UI.
</div>
</section>

<section class="section contact">
<h2 style="text-align:center;">Contact Us</h2>

<input type="text" placeholder="Your Name">
<input type="email" placeholder="Email">

<textarea rows="5" placeholder="Message"></textarea>

<button class="btn cartbtn"
onclick="showToast('Message Sent Successfully')">
Send Message
</button>
</section>

<footer>
<h3>ShopSphere Pro</h3>
<p>Competition Ready Shopping Website</p>
</footer>

<div id="toast"></div>

<script>

const products=[

{
name:"Laptop",
cat:"Tech",
price:"₹49,999",
img:"https://picsum.photos/400/300?1"
},

{
name:"Smartphone",
cat:"Tech",
price:"₹24,999",
img:"https://picsum.photos/400/300?2"
},

{
name:"Watch",
cat:"Tech",
price:"₹4,999",
img:"https://picsum.photos/400/300?3"
},

{
name:"Sneakers",
cat:"Fashion",
price:"₹2,999",
img:"https://picsum.photos/400/300?4"
},

{
name:"Jacket",
cat:"Fashion",
price:"₹1,999",
img:"https://picsum.photos/400/300?5"
},

{
name:"Headphones",
cat:"Tech",
price:"₹3,499",
img:"https://picsum.photos/400/300?6"
}

];

let cart=0;
let wish=0;

function displayProducts(list){

const container=
document.getElementById("productContainer");

container.innerHTML="";

list.forEach(product=>{

container.innerHTML+=`

<div class="card">

<img src="${product.img}">

<div class="content">

<h3>${product.name}</h3>

<p>${product.cat}</p>

<div class="price">${product.price}</div>

<button class="btn cartbtn"
onclick="addCart()">
Add Cart
</button>

<button class="btn wishbtn"
onclick="addWish()">
❤️ Wishlist
</button>

</div>

</div>

`;

});
}

function addCart(){

cart++;

document.getElementById("cartCount")
.innerText=cart;

showToast("Added To Cart");
}

function addWish(){

wish++;

document.getElementById("wishCount")
.innerText=wish;

showToast("Added To Wishlist");
}

function filterProducts(cat){

if(cat==="All")
displayProducts(products);

else
displayProducts(
products.filter(
p=>p.cat===cat
)
);
}

document.getElementById("search")
.addEventListener("keyup",function(){

let value=
this.value.toLowerCase();

displayProducts(
products.filter(product=>
product.name.toLowerCase()
.includes(value)
)
);

});

function toggleDark(){

document.body.classList.toggle("dark");
}

function showToast(msg){

const toast=
document.getElementById("toast");

toast.innerText=msg;

toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2000);
}

displayProducts(products);

</script>

</body>
</html>
